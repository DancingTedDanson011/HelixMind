#DancingTedDanson was here
name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        # SECURITY: Pin to commit SHA to prevent supply-chain attacks via tag manipulation
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            echo "=== Git Fetch & Pull ==="
            cd /opt/helixmind/web
            git fetch origin main
            git pull --ff-only origin main

            echo "=== Stop PM2 (all) ==="
            pm2 stop all 2>/dev/null || true

            echo "=== Enter web directory ==="
            cd /opt/helixmind/web/web

            # Copy .env from parent if not present
            if [ ! -f .env ] && [ -f /opt/helixmind/web/.env ]; then
              cp /opt/helixmind/web/.env .env
              echo "Copied .env from repo root"
            fi

            # H10: Export only the env vars needed for build (not all secrets into shell)
            # Strip surrounding quotes that .env files commonly use
            strip_env() { grep "^$1=" .env | cut -d= -f2- | sed "s/^['\"]//;s/['\"]$//"; }
            export DATABASE_URL=$(strip_env DATABASE_URL)
            export NEXTAUTH_URL=$(strip_env NEXTAUTH_URL)
            export NEXT_PUBLIC_APP_URL=$(strip_env NEXT_PUBLIC_APP_URL)

            echo "=== Clean node_modules + build cache ==="
            rm -rf node_modules node_modules_old_* 2>/dev/null || true
            rm -rf .next 2>/dev/null || true
            rm -rf "$HOME/.cache/prisma" 2>/dev/null || true
            npm cache clean --force 2>/dev/null || true

            echo "=== NPM Install ==="
            npm ci

            echo "=== Prisma DB Push (safe, no --accept-data-loss) ==="
            npx prisma db push

            echo "=== Prisma Generate ==="
            npx prisma generate

            echo "=== Build ==="
            npm run build

            echo "=== PM2 Restart ==="
            pm2 delete helixmind-web 2>/dev/null || true
            pm2 start ecosystem.config.cjs
            pm2 start helixmind-webhook 2>/dev/null || true
            sleep 3

            echo "=== PM2 Status ==="
            pm2 status

            echo "=== PM2 Logs (last 30 lines) ==="
            pm2 logs helixmind-web --nostream --lines 30 || true
            #teploy failed thats why i try adding a comment to deploy

            pm2 save
            echo "=== Deploy complete: $(date) ==="
