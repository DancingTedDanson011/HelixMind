services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-helixmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helixmind}
      POSTGRES_DB: ${POSTGRES_DB:-helixmind}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-helixmind}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      # DATABASE_URL is injected here so it uses the internal docker hostname 'postgres',
      # overriding whatever is set in .env (which may point to localhost)
      DATABASE_URL: "postgresql://${POSTGRES_USER:-helixmind}:${POSTGRES_PASSWORD:-helixmind}@postgres:5432/${POSTGRES_DB:-helixmind}?schema=public"
      NODE_ENV: production
      # NEXTAUTH_URL must match the public URL Nginx exposes — set in .env
      NEXTAUTH_URL: "${NEXTAUTH_URL}"
      # Trust the X-Forwarded-Proto header set by Nginx
      NEXTAUTH_URL_INTERNAL: "http://web:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/nginx/ssl:ro
    depends_on:
      web:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  postgres_data:
  nginx_certs:
